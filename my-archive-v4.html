<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --text2: #8888aa;
    --gold: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; min-height: 100vh; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(255,101,132,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: var(--bg); }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 3rem 2.5rem; text-align: center; max-width: 380px; width: 90%; }
  .login-logo { font-size: 3rem; margin-bottom: 0.5rem; }
  .login-title { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
  .login-sub { color: var(--text2); font-size: 0.95rem; margin-bottom: 2.5rem; }
  .btn-google { display: flex; align-items: center; justify-content: center; gap: 0.8rem; width: 100%; background: white; color: #333; border: none; border-radius: 0.8rem; padding: 0.9rem 1.5rem; font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
  .btn-google:hover { transform: translateY(-2px); }
  .btn-google img { width: 22px; height: 22px; }
  .login-note { color: var(--text2); font-size: 0.8rem; margin-top: 1.5rem; }

  #app { display: none; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .logo { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tagline { color: var(--text2); font-size: 0.85rem; }
  .user-info { display: flex; align-items: center; gap: 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
  .user-name { font-size: 0.85rem; color: var(--text2); }
  .btn-logout { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: 0.8rem; font-family: 'Tajawal', sans-serif; padding: 0.2rem 0.5rem; border-radius: 0.4rem; }

  .stats { display: flex; gap: 0.8rem; margin-bottom: 2rem; flex-wrap: wrap; overflow-x: auto; padding-bottom: 0.5rem; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 2rem; padding: 0.4rem 1rem; font-size: 0.82rem; color: var(--text2); display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
  .stat-pill span { color: var(--text); font-weight: 700; }

  .add-box { background: var(--surface); border: 1px solid var(--border); border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1.5rem; transition: border-color 0.3s; }
  .add-box:focus-within { border-color: var(--accent); }
  .add-box-title { font-size: 0.9rem; color: var(--text2); margin-bottom: 1rem; font-weight: 500; }
  .input-row { display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap; }
  textarea { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 0.8rem; padding: 0.9rem 1rem; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 0.95rem; resize: none; height: 80px; outline: none; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); }
  .btn-add { background: linear-gradient(135deg, var(--accent), #8b83ff); border: none; border-radius: 0.8rem; padding: 0 1.5rem; color: white; font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; min-height: 80px; white-space: nowrap; transition: opacity 0.2s; }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  .cat-selector-label { font-size: 0.82rem; color: var(--text2); margin-bottom: 0.4rem; }
  .cat-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .cat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 0.9rem; font-size: 0.8rem; color: var(--text2); cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .cat-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .cat-btn.ai-pick { border-style: dashed; }

  .ai-status { display: none; align-items: center; gap: 0.6rem; color: var(--accent); font-size: 0.88rem; margin-top: 0.5rem; }
  .ai-status.show { display: flex; }
  .dot-wave { display: flex; gap: 3px; }
  .dot-wave span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: wave 1.2s infinite; }
  .dot-wave span:nth-child(2) { animation-delay: 0.2s; }
  .dot-wave span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes wave { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .controls { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text2); }
  input[type="search"] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 0.8rem; padding: 0.75rem 2.8rem 0.75rem 1rem; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 0.95rem; outline: none; }
  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text2); }
  .filter-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .pill { background: var(--surface); border: 1px solid var(--border); border-radius: 2rem; padding: 0.45rem 1rem; font-size: 0.82rem; color: var(--text2); cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .pill:hover, .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  .items-grid { display: grid; gap: 1rem; }
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 1.2rem; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; animation: cardIn 0.4s ease; }
  .item-card::before { content: ''; position: absolute; top: 0; right: 0; width: 3px; height: 100%; border-radius: 0 1rem 1rem 0; }
  .item-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(108,99,255,0.1); }
  .item-card[data-cat="تجارة"]::before { background: #f7c948; }
  .item-card[data-cat="بادل"]::before { background: #43e97b; }
  .item-card[data-cat="تسوق"]::before { background: #ff6584; }
  .item-card[data-cat="تقنية"]::before { background: #6c63ff; }
  .item-card[data-cat="تعلم انجليزي"]::before { background: #4fc3f7; }
  .item-card[data-cat="مطاعم"]::before { background: #ff9800; }
  .item-card[data-cat="افلام"]::before { background: #e91e63; }
  .item-card[data-cat="أخرى"]::before { background: #8888aa; }

  .item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
  .item-content { font-size: 0.95rem; line-height: 1.6; color: var(--text); flex: 1; word-break: break-all; }
  .item-link { color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; margin-top: 0.5rem; padding: 0.3rem 0.8rem; background: rgba(108,99,255,0.1); border-radius: 2rem; border: 1px solid rgba(108,99,255,0.3); transition: background 0.2s; }
  .item-link:hover { background: rgba(108,99,255,0.25); }
  .item-cat-badge { font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.7rem; border-radius: 2rem; white-space: nowrap; flex-shrink: 0; background: rgba(108,99,255,0.15); color: var(--accent); }
  .item-summary { font-size: 0.82rem; color: var(--text2); margin-top: 0.5rem; font-style: italic; }
  .item-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem; }
  .tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 2rem; padding: 0.2rem 0.6rem; font-size: 0.75rem; color: var(--text2); }
  .item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
  .item-date { font-size: 0.75rem; color: var(--text2); }
  .item-actions { display: flex; gap: 0.4rem; }
  .btn-edit, .btn-delete { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0.2rem 0.5rem; border-radius: 0.4rem; transition: color 0.2s, background 0.2s; color: var(--text2); }
  .btn-edit:hover { color: var(--gold); background: rgba(247,201,72,0.1); }
  .btn-delete:hover { color: var(--accent2); background: rgba(255,101,132,0.1); }

  /* Edit modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 1.2rem; padding: 1.5rem; width: 100%; max-width: 500px; }
  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.2rem; color: var(--text); }
  .modal textarea { width: 100%; height: 100px; margin-bottom: 1rem; }
  .modal-cats { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
  .btn-save { background: linear-gradient(135deg, var(--accent), #8b83ff); border: none; border-radius: 0.8rem; padding: 0.7rem 1.5rem; color: white; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); border-radius: 0.8rem; padding: 0.7rem 1.5rem; color: var(--text2); font-family: 'Tajawal', sans-serif; font-size: 0.95rem; cursor: pointer; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }

  @keyframes cardIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <div class="login-title">مكتبتي</div>
    <div class="login-sub">أرشيفك الشخصي الذكي</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      تسجيل الدخول بـ Google
    </button>
    <div class="login-note">بياناتك محفوظة على حسابك فقط 🔒</div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ تعديل العنصر</div>
    <textarea id="edit-content" placeholder="المحتوى..."></textarea>
    <div class="modal-cats" id="edit-cats"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">إلغاء</button>
      <button class="btn-save" onclick="saveEdit()">💾 حفظ</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="container">
    <header>
      <div>
        <div class="logo">📚 مكتبتي</div>
        <div class="tagline">أرشيفك الشخصي الذكي</div>
      </div>
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
        <button class="btn-logout" onclick="signOut()">خروج</button>
      </div>
    </header>

    <div class="stats" id="stats-bar"></div>

    <div class="add-box">
      <div class="add-box-title">✨ أضف محتوى جديد</div>
      <div class="input-row">
        <textarea id="content-input" placeholder="الصق رابط تيك توك، اكتب ملاحظة، أو اذكر اسم ملف..."></textarea>
        <button class="btn-add" id="add-btn" onclick="addItem()">➕ أضف</button>
      </div>
      <div class="cat-selector-label">📂 التصنيف:</div>
      <div class="cat-selector" id="cat-selector"></div>
      <div class="ai-status" id="ai-status">
        <div class="dot-wave"><span></span><span></span><span></span></div>
        الذكاء الاصطناعي يحلل ويصنف...
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="ابحث في مكتبتك..." oninput="renderItems()">
      </div>
      <div class="filter-pills" id="filter-pills"></div>
    </div>

    <div class="items-grid" id="items-grid"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD7Yq5ChqXBJkzeaP_rfcgajh9af3l5LBY",
    authDomain: "maktabati-e063b.firebaseapp.com",
    projectId: "maktabati-e063b",
    storageBucket: "maktabati-e063b.firebasestorage.app",
    messagingSenderId: "407225049800",
    appId: "1:407225049800:web:53055f32589c3295527bfd"
  };

  const CATEGORIES = ["تجارة","بادل","تسوق","تقنية","تعلم انجليزي","مطاعم","افلام","أخرى"];
  const CAT_ICONS = {"تجارة":"💼","بادل":"🔄","تسوق":"🛍️","تقنية":"💻","تعلم انجليزي":"🇬🇧","مطاعم":"🍽️","افلام":"🎬","أخرى":"📌"};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let items = [];
  let activeFilter = 'الكل';
  let selectedCat = 'ai';
  let unsubscribe = null;
  let editingId = null;
  let editingCat = null;

  function isURL(str) {
    return /https?:\/\/[^\s]+/.test(str);
  }

  function extractURL(str) {
    const match = str.match(/https?:\/\/[^\s]+/);
    return match ? match[0] : null;
  }

  function buildCatSelector() {
    const sel = document.getElementById('cat-selector');
    sel.innerHTML = `<button class="cat-btn ai-pick selected" data-cat="ai" onclick="selectCat('ai',this)">🤖 ذكاء اصطناعي</button>`;
    CATEGORIES.forEach(cat => {
      sel.innerHTML += `<button class="cat-btn" data-cat="${cat}" onclick="selectCat('${cat}',this)">${CAT_ICONS[cat]} ${cat}</button>`;
    });
  }

  window.selectCat = (cat, el) => {
    selectedCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  };

  function buildFilters() {
    const fp = document.getElementById('filter-pills');
    fp.innerHTML = `<button class="pill active" onclick="setFilter('الكل',this)">الكل</button>`;
    CATEGORIES.forEach(cat => {
      fp.innerHTML += `<button class="pill" onclick="setFilter('${cat}',this)">${CAT_ICONS[cat]} ${cat}</button>`;
    });
  }

  function updateStats() {
    const bar = document.getElementById('stats-bar');
    let html = `<div class="stat-pill">🗂️ الكل <span>${items.length}</span></div>`;
    CATEGORIES.forEach(cat => {
      const count = items.filter(i => i.category === cat).length;
      if (count > 0) html += `<div class="stat-pill">${CAT_ICONS[cat]} ${cat} <span>${count}</span></div>`;
    });
    bar.innerHTML = html;
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || '';
      document.getElementById('user-avatar').src = user.photoURL || '';
      buildCatSelector();
      buildFilters();
      loadItems();
    } else {
      currentUser = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      if (unsubscribe) unsubscribe();
    }
  });

  window.signInWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    try { await signInWithPopup(auth, provider); }
    catch(e) { alert('حدث خطأ، حاول مرة ثانية'); }
  };

  window.signOut = async () => {
    if (unsubscribe) unsubscribe();
    await fbSignOut(auth);
  };

  function loadItems() {
    const q = query(collection(db, `users/${currentUser.uid}/items`), orderBy('createdAt','desc'));
    unsubscribe = onSnapshot(q, snap => {
      items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderItems();
    });
  }

  window.setFilter = (f, el) => {
    activeFilter = f;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderItems();
  };

  window.renderItems = () => {
    const grid = document.getElementById('items-grid');
    const q = document.getElementById('search-input').value.toLowerCase();
    let filtered = items.filter(item => {
      const matchFilter = activeFilter === 'الكل' || item.category === activeFilter;
      const matchSearch = !q || item.content?.toLowerCase().includes(q) || item.summary?.toLowerCase().includes(q) || (item.tags||[]).some(t => t.toLowerCase().includes(q));
      return matchFilter && matchSearch;
    });

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">${q?'🔍':'📭'}</div><h3>${q?'ما فيه نتائج':'مكتبتك فاضية'}</h3><p>${q?'جرب كلمة ثانية':'أضف أول محتوى من فوق ☝️'}</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(item => {
      const url = extractURL(item.content);
      const linkBtn = url ? `<a class="item-link" href="${url}" target="_blank" rel="noopener">🔗 افتح الرابط</a>` : '';
      return `
        <div class="item-card" data-cat="${item.category||'أخرى'}">
          <div class="item-header">
            <div class="item-content">${escapeHtml(item.content)}${linkBtn}</div>
            <span class="item-cat-badge">${CAT_ICONS[item.category]||'📌'} ${item.category||'أخرى'}</span>
          </div>
          ${item.summary ? `<div class="item-summary">💡 ${escapeHtml(item.summary)}</div>` : ''}
          ${item.tags?.length ? `<div class="item-tags">${item.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
          <div class="item-footer">
            <span class="item-date">🕒 ${item.date}</span>
            <div class="item-actions">
              <button class="btn-edit" onclick="openEdit('${item.id}')">✏️</button>
              <button class="btn-delete" onclick="deleteItem('${item.id}')">🗑️</button>
            </div>
          </div>
        </div>`;
    }).join('');
  };

  window.deleteItem = async (id) => {
    await deleteDoc(doc(db, `users/${currentUser.uid}/items`, id));
  };

  // Edit
  window.openEdit = (id) => {
    const item = items.find(i => i.id === id);
    if (!item) return;
    editingId = id;
    editingCat = item.category || 'أخرى';
    document.getElementById('edit-content').value = item.content;

    const catsDiv = document.getElementById('edit-cats');
    catsDiv.innerHTML = CATEGORIES.map(cat =>
      `<button class="cat-btn ${cat === editingCat ? 'selected' : ''}" onclick="selectEditCat('${cat}',this)">${CAT_ICONS[cat]} ${cat}</button>`
    ).join('');

    document.getElementById('edit-modal').classList.add('show');
  };

  window.selectEditCat = (cat, el) => {
    editingCat = cat;
    document.querySelectorAll('#edit-cats .cat-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  };

  window.closeEdit = () => {
    editingId = null;
    document.getElementById('edit-modal').classList.remove('show');
  };

  window.saveEdit = async () => {
    if (!editingId) return;
    const content = document.getElementById('edit-content').value.trim();
    if (!content) return;
    await updateDoc(doc(db, `users/${currentUser.uid}/items`, editingId), { content, category: editingCat });
    closeEdit();
  };

  window.addItem = async () => {
    const input = document.getElementById('content-input');
    const content = input.value.trim();
    if (!content || !currentUser) return;

    const btn = document.getElementById('add-btn');
    const status = document.getElementById('ai-status');
    btn.disabled = true;

    let category = selectedCat === 'ai' ? null : selectedCat;
    let summary = '', tags = [];

    if (selectedCat === 'ai') {
      status.classList.add('show');
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: `صنّف هذا المحتوى في أحد هذه التصنيفات فقط: ${CATEGORIES.join('، ')}.\n\nالمحتوى: "${content}"\n\nأرجع JSON فقط بدون backticks:\n{"category":"اسم التصنيف","summary":"ملخص قصير بالعربي","tags":["وسم1","وسم2"]}` }]
          })
        });
        const data = await response.json();
        const text = data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
        const ai = JSON.parse(text);
        category = CATEGORIES.includes(ai.category) ? ai.category : 'أخرى';
        summary = ai.summary || '';
        tags = ai.tags || [];
      } catch(e) { category = 'أخرى'; }
      status.classList.remove('show');
    }

    await addDoc(collection(db, `users/${currentUser.uid}/items`), {
      content, category, summary, tags,
      date: new Date().toLocaleDateString('ar-SA', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }),
      createdAt: Date.now()
    });

    input.value = '';
    btn.disabled = false;
  };

  function escapeHtml(str='') {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
